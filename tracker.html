<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Outreach Tracker — Private</title>
<style>
:root {
  --bg: #0a0a0f; --surface: #14141c; --surface-2: #1c1c26;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #e8e8f0; --text-dim: #888; --text-dimmer: #555;
  --accent: #4a90d9; --accent-2: #7b68ee;
  --green: #32cd32; --amber: #ffb347; --red: #ff6b6b;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; line-height: 1.6; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px 64px; }
.nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; margin-right: 24px; }
.nav a:hover { color: var(--accent); }
.nav .brand { color: var(--text); font-weight: 600; font-size: 14px; }
.pill { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 100px; font-size: 11px; letter-spacing: 0.05em; margin-bottom: 16px; margin-right: 8px; }
.pill.private { background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.3); color: var(--amber); }
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
h1 { font-size: 32px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.02em; }
.subtitle { color: var(--text-dim); font-size: 14px; margin: 0; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 24px 0; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }

.add-form {
  background: linear-gradient(135deg, rgba(123,104,238,0.1), rgba(74,144,217,0.05));
  border: 1px solid rgba(123,104,238,0.2); border-radius: 12px;
  padding: 20px 24px; margin-bottom: 24px;
}
.add-form h3 { margin: 0 0 16px; font-size: 15px; color: var(--accent-2); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-grid input, .form-grid select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 6px;
  font-size: 12px; font-family: inherit;
}
.form-grid input:focus, .form-grid select:focus { outline: none; border-color: var(--accent); }
.form-message {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px; border-radius: 6px;
  font-size: 12px; font-family: inherit; min-height: 60px; margin-bottom: 10px;
  resize: vertical;
}
.btn-add {
  background: var(--accent-2); color: #fff; border: none;
  padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}

.entry {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 22px; margin-bottom: 10px;
  display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start;
}
.entry.needs-followup { border-left: 4px solid var(--amber); }
.entry.replied { border-left: 4px solid var(--green); }
.entry.ghosted { border-left: 4px solid var(--text-dimmer); opacity: 0.7; }
.entry-head { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.entry-company { font-weight: 700; font-size: 14px; }
.entry-role { color: var(--text-dim); font-size: 13px; }
.entry-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; flex-wrap: wrap; }
.entry-meta strong { color: var(--text); }
.followup-badge {
  background: rgba(255,179,71,0.15); color: var(--amber);
  padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.05em;
}
.followup-badge.urgent { background: rgba(255,107,107,0.15); color: var(--red); }
.entry-msg { font-size: 12px; color: var(--text-dim); line-height: 1.5; padding: 8px 12px; background: rgba(0,0,0,0.2); border-radius: 6px; }
.entry-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.status-select-tracker {
  padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: inherit; border: 1px solid; background: transparent; min-width: 140px;
}
.delete-btn {
  background: transparent; border: 1px solid rgba(255,107,107,0.2);
  color: var(--red); padding: 4px 10px; border-radius: 4px;
  font-size: 10px; cursor: pointer; font-family: inherit;
}
.delete-btn:hover { background: rgba(255,107,107,0.1); }

.empty { text-align: center; padding: 64px 20px; color: var(--text-dim); border: 1px dashed var(--border); border-radius: 12px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }

.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text-dim); padding: 8px 16px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-btn.active { background: rgba(74,144,217,0.2); border-color: var(--accent); color: var(--accent); }
.filter-btn .count { background: rgba(255,255,255,0.1); padding: 1px 8px; border-radius: 100px; font-size: 10px; font-weight: 700; }
.filter-btn.active .count { background: rgba(74,144,217,0.3); }

@media (max-width: 768px) {
  .form-grid { grid-template-columns: 1fr 1fr; }
  .entry { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">

<nav class="nav">
  <a href="/" class="brand">Chaitanya Kasani</a>
  <div>
    <a href="/">Profile</a>
    <a href="/jobs-private.html">Jobs</a>
    <a href="/tracker.html">Tracker</a>
    <a href="/prompts.html">3-Week Plan</a>
  </div>
</nav>

<div class="header">
  <span class="pill private"><span class="dot"></span> OUTREACH TRACKER</span>
  <h1>Outreach Pipeline</h1>
  <p class="subtitle">Log every message sent. Get reminded to follow up after 5 days. Track what's working.</p>
</div>

<div class="stats" id="stats"></div>

<div class="add-form">
  <h3>+ Log a new outreach</h3>
  <div class="form-grid">
    <input type="text" id="newCompany" placeholder="Company (e.g. Stripe)" />
    <input type="text" id="newRole" placeholder="Role (e.g. Staff PM Payments)" />
    <input type="text" id="newContact" placeholder="Contact name" />
    <select id="newChannel">
      <option value="LinkedIn">LinkedIn DM</option>
      <option value="Email">Email</option>
      <option value="Referral">Referral</option>
      <option value="Application">Application Only</option>
    </select>
  </div>
  <textarea id="newMessage" class="form-message" placeholder="Paste the message you sent (optional but useful for tracking what works)..."></textarea>
  <button class="btn-add" onclick="addEntry()">Log Outreach</button>
</div>

<div class="filters" id="filters"></div>

<div id="entryList"></div>

</div>

<script>
let entries = JSON.parse(localStorage.getItem("outreach-entries") || "[]");
let currentFilter = "all";

function saveEntries() { localStorage.setItem("outreach-entries", JSON.stringify(entries)); }

function addEntry() {
  const company = document.getElementById("newCompany").value.trim();
  const role = document.getElementById("newRole").value.trim();
  const contact = document.getElementById("newContact").value.trim();
  const channel = document.getElementById("newChannel").value;
  const message = document.getElementById("newMessage").value.trim();
  if (!company || !role) { alert("Company and Role required"); return; }
  entries.unshift({
    id: Date.now().toString(),
    company, role, contact, channel, message,
    sentAt: new Date().toISOString(),
    status: "sent"
  });
  saveEntries();
  document.getElementById("newCompany").value = "";
  document.getElementById("newRole").value = "";
  document.getElementById("newContact").value = "";
  document.getElementById("newMessage").value = "";
  render();
}

function updateStatus(id, status) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  e.status = status;
  if (status === "replied" || status === "interview" || status === "offer") {
    e.repliedAt = new Date().toISOString();
  }
  saveEntries();
  render();
}

function deleteEntry(id) {
  if (!confirm("Delete this outreach record?")) return;
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  render();
}

function daysSince(iso) {
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

function needsFollowup(e) {
  return e.status === "sent" && daysSince(e.sentAt) >= 5 && daysSince(e.sentAt) <= 14;
}

function ghosted(e) {
  return e.status === "sent" && daysSince(e.sentAt) > 14;
}

function render() {
  // Stats
  const sent = entries.length;
  const replied = entries.filter(e => ["replied","interview","offer"].includes(e.status)).length;
  const interviews = entries.filter(e => ["interview","offer"].includes(e.status)).length;
  const offers = entries.filter(e => e.status === "offer").length;
  const followups = entries.filter(needsFollowup).length;
  const replyRate = sent > 0 ? Math.round((replied / sent) * 100) : 0;

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-value" style="color:var(--accent)">${sent}</div><div class="stat-label">Total Sent</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">${replied}</div><div class="stat-label">Replies</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--accent-2)">${interviews}</div><div class="stat-label">Interviews</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">${offers}</div><div class="stat-label">Offers</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--amber)">${followups}</div><div class="stat-label">Need Followup</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--accent)">${replyRate}%</div><div class="stat-label">Reply Rate</div></div>
  `;

  // Filters
  const counts = {
    all: entries.length,
    followup: followups,
    waiting: entries.filter(e => e.status === "sent").length,
    replied: replied,
    ghosted: entries.filter(ghosted).length
  };
  const filterDefs = [
    { id: "all", label: "All", count: counts.all },
    { id: "followup", label: "🔔 Need Followup", count: counts.followup },
    { id: "waiting", label: "⏳ Waiting", count: counts.waiting },
    { id: "replied", label: "✅ Replied", count: counts.replied },
    { id: "ghosted", label: "💤 Ghosted", count: counts.ghosted }
  ];
  document.getElementById("filters").innerHTML = filterDefs.map(f => 
    `<button class="filter-btn ${currentFilter === f.id ? 'active' : ''}" data-filter="${f.id}">
      ${f.label} <span class="count">${f.count}</span>
    </button>`
  ).join("");
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { currentFilter = btn.dataset.filter; render(); });
  });

  // Entries
  let filtered = [...entries];
  if (currentFilter === "followup") filtered = filtered.filter(needsFollowup);
  if (currentFilter === "waiting") filtered = filtered.filter(e => e.status === "sent");
  if (currentFilter === "replied") filtered = filtered.filter(e => ["replied","interview","offer"].includes(e.status));
  if (currentFilter === "ghosted") filtered = filtered.filter(ghosted);

  if (filtered.length === 0) {
    document.getElementById("entryList").innerHTML = entries.length === 0 ?
      `<div class="empty"><div class="empty-icon">📬</div><h3 style="color:var(--text)">No outreach logged yet</h3><p style="font-size:13px">Start by logging your first message above. The tracker will remind you to follow up.</p></div>` :
      `<div class="empty"><div class="empty-icon">🔍</div><h3 style="color:var(--text)">No entries match this filter</h3></div>`;
    return;
  }

  document.getElementById("entryList").innerHTML = filtered.map(e => {
    const days = daysSince(e.sentAt);
    const isFollowup = needsFollowup(e);
    const isGhosted = ghosted(e);
    const isReplied = ["replied","interview","offer"].includes(e.status);
    let cls = "";
    if (isReplied) cls = "replied";
    else if (isFollowup) cls = "needs-followup";
    else if (isGhosted) cls = "ghosted";

    const statusColors = {
      sent: { bg: "rgba(74,144,217,0.15)", fg: "#4a90d9", brd: "#4a90d9" },
      replied: { bg: "rgba(50,205,50,0.15)", fg: "#32cd32", brd: "#32cd32" },
      interview: { bg: "rgba(255,179,71,0.15)", fg: "#ffb347", brd: "#ffb347" },
      offer: { bg: "rgba(50,205,50,0.25)", fg: "#32cd32", brd: "#32cd32" },
      ghosted: { bg: "rgba(136,136,136,0.15)", fg: "#888", brd: "#888" }
    };
    const sc = statusColors[e.status] || statusColors.sent;

    return `
    <div class="entry ${cls}">
      <div>
        <div class="entry-head">
          <span class="entry-company">${escapeHtml(e.company)}</span>
          <span class="entry-role">· ${escapeHtml(e.role)}</span>
          ${isFollowup ? `<span class="followup-badge ${days >= 7 ? 'urgent' : ''}">FOLLOW UP NOW (${days}d ago)</span>` : ""}
        </div>
        <div class="entry-meta">
          ${e.contact ? `<span>👤 <strong>${escapeHtml(e.contact)}</strong></span>` : ""}
          <span>📡 ${escapeHtml(e.channel)}</span>
          <span>📅 Sent ${days === 0 ? "today" : days + " days ago"}</span>
        </div>
        ${e.message ? `<div class="entry-msg">${escapeHtml(e.message).slice(0, 280)}${e.message.length > 280 ? "…" : ""}</div>` : ""}
      </div>
      <div class="entry-actions">
        <select class="status-select-tracker" onchange="updateStatus('${e.id}', this.value)" style="background:${sc.bg};color:${sc.fg};border-color:${sc.brd};">
          <option value="sent" ${e.status==="sent"?"selected":""}>⏳ Waiting</option>
          <option value="replied" ${e.status==="replied"?"selected":""}>💬 Replied</option>
          <option value="interview" ${e.status==="interview"?"selected":""}>🎯 Interview</option>
          <option value="offer" ${e.status==="offer"?"selected":""}>🎉 Offer</option>
          <option value="ghosted" ${e.status==="ghosted"?"selected":""}>💤 No Response</option>
        </select>
        <button class="delete-btn" onclick="deleteEntry('${e.id}')">Delete</button>
      </div>
    </div>`;
  }).join("");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

render();
</script>
</body>
</html>
