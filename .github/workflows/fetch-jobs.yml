name: Fetch Fresh Jobs

on:
  schedule:
    # Runs every 4 hours instead of 6 — fresher data
    # Times in UTC: 12am, 4am, 8am, 12pm, 4pm, 8pm
    - cron: '0 */4 * * *'

  # Manual trigger from GitHub UI — for testing or instant refresh
  workflow_dispatch:

  # Auto-run when you push changes to the fetcher script
  push:
    paths:
      - 'scripts/fetch-jobs.js'
      - '.github/workflows/fetch-jobs.yml'

# Cancel any in-progress runs if a new one starts (prevents overlap)
concurrency:
  group: fetch-jobs
  cancel-in-progress: false

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Hard timeout — if the script hangs, kill it after 5 min
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run job fetcher
        id: fetcher
        run: |
          echo "🚀 Starting fetch at $(date -u)"
          node scripts/fetch-jobs.js
          echo "✅ Fetch completed at $(date -u)"

      - name: Show what changed
        run: |
          if [ -f jobs.json ]; then
            TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('jobs.json')).totalJobs || 0)")
            HIGH=$(node -e "console.log(JSON.parse(require('fs').readFileSync('jobs.json')).highMatchJobs || 0)")
            echo "📊 Total roles: $TOTAL"
            echo "🎯 90%+ match:  $HIGH"
            echo "📅 Updated:     $(date -u)"
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add jobs.json

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "💤 No changes — nothing to commit"
          else
            TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('jobs.json')).totalJobs || 0)")
            git commit -m "🤖 Refresh jobs ($TOTAL roles) — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Pushed new jobs.json with $TOTAL roles"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Job Fetch Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          if [ -f jobs.json ]; then
            TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('jobs.json')).totalJobs || 0)")
            HIGH=$(node -e "console.log(JSON.parse(require('fs').readFileSync('jobs.json')).highMatchJobs || 0)")
            echo "- **Total roles found:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **90%+ matches:** $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- **Dashboard:** [chaitanya-product.com/jobs-private.html](https://chaitanya-product.com/jobs-private.html)" >> $GITHUB_STEP_SUMMARY
          fi
